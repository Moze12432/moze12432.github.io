<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Product Tracker (Blockchain Simulation)</title>
<style>
body {margin:0;font-family:Segoe UI;background: linear-gradient(135deg,#ff7a00,#ffb347);} 
.container {max-width:1100px;margin:40px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.2);} 
h1 {text-align:center;color:#ff7a00;} 
.status {display:flex;gap:10px;margin:20px 0;} 
.stage {flex:1;padding:15px;text-align:center;border-radius:10px;background:#eee;} 
.active {background:#ff7a00;color:white;font-weight:bold;} 
button, input {padding:10px;margin:5px;border:none;border-radius:8px;} 
button {background:#ff7a00;color:white;cursor:pointer;} 
.log {margin-top:20px;background:#111;color:#0f0;padding:10px;height:180px;overflow:auto;font-family:monospace;} 
.blockchain {margin-top:20px;background:#222;color:#0ff;padding:10px;height:200px;overflow:auto;font-family:monospace;} 
</style>
</head>
<body>

<div class="container">
<h1>🟧 Smart Product Tracker (Blockchain)</h1>

<input type="text" id="productAddress" placeholder="Product Address" />
<button onclick="setAddress()">Set Address</button>

<input type="text" id="owner" placeholder="Owner Name" />
<button onclick="transferOwnership()">Transfer</button>

<br>
<button onclick="nextStage()">Next Stage</button>
<button onclick="validateChain()">Validate Chain</button>
<button onclick="reset()">Reset</button>

<div class="status">
<div id="design" class="stage active">Design</div>
<div id="manufacturing" class="stage">Manufacturing</div>
<div id="shipping" class="stage">Shipping</div>
<div id="sold" class="stage">Sold</div>
</div>

<div><b>Address:</b> <span id="addressDisplay">Not set</span></div>
<div><b>Owner:</b> <span id="ownerDisplay">Manufacturer</span></div>

<div class="log" id="log"></div>
<div class="blockchain" id="chain"></div>
</div>

<script>
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

class Block {
  constructor(index, data, prevHash='') {
    this.index = index;
    this.timestamp = new Date().toLocaleTimeString();
    this.data = data;
    this.prevHash = prevHash;
    this.hash = '';
  }

  async calculateHash() {
    this.hash = await sha256(this.index + this.prevHash + this.timestamp + JSON.stringify(this.data));
  }
}

class Blockchain {
  constructor() {
    this.chain = [];
  }

  async addBlock(data) {
    const prevHash = this.chain.length ? this.chain[this.chain.length - 1].hash : '0';
    const block = new Block(this.chain.length, data, prevHash);
    await block.calculateHash();
    this.chain.push(block);
    displayChain();
  }

  async isValid() {
    for (let i = 1; i < this.chain.length; i++) {
      const curr = this.chain[i];
      const prev = this.chain[i - 1];

      const recalculated = await sha256(curr.index + curr.prevHash + curr.timestamp + JSON.stringify(curr.data));
      if (curr.hash !== recalculated) return false;
      if (curr.prevHash !== prev.hash) return false;
    }
    return true;
  }
}

class SmartContract {
  constructor() {
    this.stage = 0;
    this.stages = ["design","manufacturing","shipping","sold"];
    this.address = null;
    this.owner = "Manufacturer";
    this.blockchain = new Blockchain();
    this.log("Contract deployed.");
  }

  async updateChain(action) {
    await this.blockchain.addBlock({
      action,
      stage: this.stages[this.stage],
      owner: this.owner,
      address: this.address
    });
  }

  async setAddress(addr) {
    this.address = addr;
    this.log("Address set: " + addr);
    await this.updateChain("Set Address");
  }

  async transferOwnership(newOwner) {
    this.owner = newOwner;
    this.log("Ownership -> " + newOwner);
    await this.updateChain("Transfer Ownership");
  }

  async nextStage() {
    if (this.stage < this.stages.length - 1) {
      this.stage++;
      this.log("Stage -> " + this.stages[this.stage]);
      await this.updateChain("Stage Change");
    } else {
      this.log("Already SOLD");
    }
  }

  reset() {
    this.stage = 0;
    this.owner = "Manufacturer";
    this.address = null;
    this.blockchain = new Blockchain();
    this.log("Reset done");
    displayChain();
  }

  log(msg) {
    const el = document.getElementById("log");
    el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
    el.scrollTop = el.scrollHeight;
  }
}

const contract = new SmartContract();

function updateUI() {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  document.getElementById(contract.stages[contract.stage]).classList.add('active');
  document.getElementById("addressDisplay").innerText = contract.address || "Not set";
  document.getElementById("ownerDisplay").innerText = contract.owner;
}

async function nextStage() { await contract.nextStage(); updateUI(); }
async function setAddress() { await contract.setAddress(document.getElementById("productAddress").value); updateUI(); }
async function transferOwnership() { await contract.transferOwnership(document.getElementById("owner").value); updateUI(); }
function reset() { contract.reset(); updateUI(); }

async function validateChain() {
  const valid = await contract.blockchain.isValid();
  contract.log(valid ? "Blockchain VALID" : "Blockchain CORRUPTED");
}

function displayChain() {
  const el = document.getElementById("chain");
  el.innerHTML = contract.blockchain.chain.map(b =>
    `#${b.index} | ${b.data.action} | Hash: ${b.hash.substring(0,10)}...<br>`
  ).join('');
}

</script>

</body>
</html>
