<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Wallet Pro</title>
<style>
    body {
        font-family: Arial;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        text-align: center;
    }
    .container {
        width: 80%;
        margin: auto;
    }
    input, button {
        padding: 10px;
        margin: 5px;
        border-radius: 5px;
        border: none;
    }
    button {
        background: #22c55e;
        color: white;
        cursor: pointer;
    }
    button:hover {
        background: #16a34a;
    }
    .danger {
        background: #ef4444;
    }
    .danger:hover {
        background: #dc2626;
    }
    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 10px;
    }
    .card {
        background: #1e293b;
        padding: 15px;
        border-radius: 10px;
        margin: 10px;
        display: inline-block;
        width: 200px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>💰 Digital Wallet Pro</h1>

    <h2>Create Wallet</h2>
    <input type="text" id="username" placeholder="Enter name">
    <button onclick="createWallet()">Create</button>

    <h2>Deposit / Withdraw</h2>
    <input type="text" id="userAction" placeholder="Username">
    <input type="number" id="actionAmount" placeholder="Amount">
    <button onclick="deposit()">Deposit</button>
    <button class="danger" onclick="withdraw()">Withdraw</button>

    <h2>Send Transaction</h2>
    <input type="text" id="sender" placeholder="Sender">
    <input type="text" id="receiver" placeholder="Receiver">
    <input type="number" id="amount" placeholder="Amount">
    <button onclick="sendMoney()">Send</button>

    <h2>Wallets</h2>
    <div id="walletList"></div>

    <h2>Transaction History</h2>
    <table>
        <thead>
            <tr>
                <th>Sender</th>
                <th>Receiver</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>
</div>

<script>
let wallets = JSON.parse(localStorage.getItem("wallets")) || {};
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

function saveData() {
    localStorage.setItem("wallets", JSON.stringify(wallets));
    localStorage.setItem("transactions", JSON.stringify(transactions));
}

function createWallet() {
    let name = document.getElementById("username").value;

    if (!name) return alert("Enter a name");
    if (wallets[name]) return alert("Wallet exists");

    wallets[name] = { balance: 100 };
    saveData();
    updateWallets();
}

function deposit() {
    let user = document.getElementById("userAction").value;
    let amount = parseFloat(document.getElementById("actionAmount").value);

    if (!wallets[user]) return alert("User not found");
    if (amount <= 0) return alert("Invalid amount");

    wallets[user].balance += amount;
    addTransaction("SYSTEM", user, amount, "Deposit");
}

function withdraw() {
    let user = document.getElementById("userAction").value;
    let amount = parseFloat(document.getElementById("actionAmount").value);

    if (!wallets[user]) return alert("User not found");
    if (wallets[user].balance < amount) return alert("Insufficient funds");

    wallets[user].balance -= amount;
    addTransaction(user, "SYSTEM", amount, "Withdraw");
}

function sendMoney() {
    let sender = document.getElementById("sender").value;
    let receiver = document.getElementById("receiver").value;
    let amount = parseFloat(document.getElementById("amount").value);

    if (!wallets[sender] || !wallets[receiver]) return alert("Invalid users");
    if (wallets[sender].balance < amount) return alert("Insufficient balance");

    wallets[sender].balance -= amount;
    wallets[receiver].balance += amount;

    addTransaction(sender, receiver, amount, "Transfer");
}

function addTransaction(sender, receiver, amount, type) {
    let t = {
        sender,
        receiver,
        amount,
        type,
        time: new Date().toLocaleString()
    };

    transactions.push(t);
    saveData();
    updateWallets();
    updateHistory();
}

function updateWallets() {
    let list = document.getElementById("walletList");
    list.innerHTML = "";

    for (let name in wallets) {
        list.innerHTML += `
        <div class="card">
            <h3>${name}</h3>
            <p>Balance: ${wallets[name].balance}</p>
        </div>`;
    }
}

function updateHistory() {
    let table = document.getElementById("history");
    table.innerHTML = "";

    transactions.slice().reverse().forEach(t => {
        table.innerHTML += `
        <tr>
            <td>${t.sender}</td>
            <td>${t.receiver}</td>
            <td>${t.amount}</td>
            <td>${t.type}</td>
            <td>${t.time}</td>
        </tr>`;
    });
}

updateWallets();
updateHistory();
</script>

</body>
</html>
