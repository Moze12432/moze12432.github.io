<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Detective Scavenger Hunt</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e2e8f0;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: #e2e8f0;
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      padding: 10px 18px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .results {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
    }

    .card {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      box-shadow: inset 0 0 8px rgba(255,255,255,0.05);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .value {
      font-size: 16px;
      font-weight: bold;
      color: #22c55e;
    }

  </style>
</head>
<body>

<h1>🕵️ Digital Detective</h1>

<div class="container">

  <p>Paste the contents of <b>clues.txt</b>:</p>

  <textarea id="inputText">
random text blah blah
this line contains apple password=secret123
noise noise 415-555-7890 more noise
another useless line CODE ALPHA
more junk text
  </textarea>

  <div>
    <button onclick="runAll()">Run Investigation</button>
  </div>

  <div class="results">
    <div class="card">
      <h3>Password</h3>
      <div id="password" class="value">-</div>
    </div>

    <div class="card">
      <h3>Phone</h3>
      <div id="phone" class="value">-</div>
    </div>

    <div class="card">
      <h3>Hidden Code</h3>
      <div id="code" class="value">-</div>
    </div>
  </div>

</div>

<script>

function getLines() {
  return document.getElementById("inputText").value.split("\n");
}

function extractPassword(lines) {
  for (let line of lines) {
    if (line.toLowerCase().includes("apple")) {
      let match = line.match(/password=([a-zA-Z0-9]+)/);
      if (match) return match[1];
    }
  }
  return "Not found";
}

function extractPhone(lines) {
  for (let line of lines) {
    let match = line.match(/(415[- ]?\d{3}[- ]?\d{4})/);
    if (match) return match[1];
  }
  return "Not found";
}

function extractCode(lines) {
  for (let line of lines) {
    let match = line.match(/CODE ([A-Z]+)/);
    if (match) return match[1];
  }
  return "Not found";
}

function runAll() {
  const lines = getLines();

  document.getElementById("password").innerText = extractPassword(lines);
  document.getElementById("phone").innerText = extractPhone(lines);
  document.getElementById("code").innerText = extractCode(lines);
}

</script>

</body>
</html>
